services:
  - type: web
    name: sunshine-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: sunshine-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: sunshine-db
    databaseName: sunshine
    user: sunshine